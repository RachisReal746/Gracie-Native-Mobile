name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env for build
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_API_URL=https://gracie-backend.onrender.com" >> .env

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: https://gracie-backend.onrender.com

      - name: Pre-generate autolinking config with packageName
        run: |
          mkdir -p android/build/generated/autolinking/

          # Run CLI to get full dependency list (for proper package autolinking)
          npx --yes @react-native-community/cli@15 config > /tmp/rn-config-raw.json 2>/tmp/rn-config-err.txt
          echo "CLI exit: $?"
          echo "=== CLI stderr ==="
          cat /tmp/rn-config-err.txt || true

          # Patch packageName into the config and save to Gradle cache location
          node -e "
          const fs = require('fs');
          let config = {};
          try {
            config = JSON.parse(fs.readFileSync('/tmp/rn-config-raw.json', 'utf8'));
            console.log('Parsed CLI config, deps:', Object.keys(config.dependencies || {}).length);
          } catch(e) {
            console.log('CLI config parse failed:', e.message);
          }
          if (!config.project) config.project = {};
          if (!config.project.android) config.project.android = {};
          config.project.android.packageName = 'com.anchoredbygrace.gracie';
          if (!config.dependencies) config.dependencies = {};
          const out = 'android/build/generated/autolinking/autolinking.json';
          fs.writeFileSync(out, JSON.stringify(config, null, 2));
          console.log('Written autolinking.json, packageName:', config.project.android.packageName);
          "

          # Create SHA cache files WITHOUT trailing newline (must match Java's shaFile.writeText)
          for lockfile in package-lock.json package.json react-native.config.js; do
            if [ -f "$lockfile" ]; then
              sha=$(sha256sum "$lockfile" | awk '{print $1}')
              printf "%s" "$sha" > "android/build/generated/autolinking/${lockfile}.sha"
              echo "SHA cached for $lockfile: $sha"
              echo "File size: $(wc -c < "android/build/generated/autolinking/${lockfile}.sha") bytes (should be 64)"
            fi
          done
          echo "=== autolinking dir contents ==="
          ls -la android/build/generated/autolinking/

      - name: Fix NDK version in android/build.gradle
        run: |
          echo "=== ndkVersion before fix ==="
          grep -n "ndkVersion" android/build.gradle || echo "(not found)"
          # Replace whatever NDK version expo-prebuild generated (r26) with r27b (clang 18)
          # All native libraries read rootProject.ext.ndkVersion from this file
          sed -i 's/ndkVersion\s*=\s*"[^"]*"/ndkVersion = "27.1.12297006"/' android/build.gradle
          echo "=== ndkVersion after fix ==="
          grep -n "ndkVersion" android/build.gradle || echo "(still not found)"

      - name: Fix Gradle wrapper version
        run: |
          PROPS=android/gradle/wrapper/gradle-wrapper.properties
          echo "=== Before fix ==="
          cat "$PROPS"
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.13-bin.zip|' "$PROPS"
          echo "=== After fix ==="
          cat "$PROPS"

      - name: Increase JVM memory for Gradle
        run: |
          # Add a blank line first to avoid appending onto the last property's line
          printf "\norg.gradle.jvmargs=-Xmx6g -XX:MetaspaceSize=512m -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError\norg.gradle.daemon=false\norg.gradle.parallel=false\n" >> android/gradle.properties
          echo "=== gradle.properties JVM settings ==="
          grep "jvmargs\|daemon\|parallel" android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          set -o pipefail
          cd android && ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log; EXIT=$?
          echo "=== Metro/JS bundler errors ==="
          grep -A 20 "createBundleRelease\|SyntaxError\|Cannot find module\|Unable to resolve\|error:" /tmp/gradle.log | head -100 || true
          exit $EXIT
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: https://gracie-backend.onrender.com

      - name: Upload APK as Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Gracie Beta (Android)
          body: Latest Android APK build
          prerelease: true
          files: android/app/build/outputs/apk/release/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
