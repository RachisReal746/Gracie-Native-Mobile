name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Fix Kotlin version in expo-updates gradle plugin
        run: |
          sed -i 's/kotlin("jvm") version "1.9.23"/kotlin("jvm") version "2.1.20"/' \
            node_modules/expo-updates/expo-updates-gradle-plugin/build.gradle.kts

      - name: Create .env for build
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_API_URL=https://gracie-backend.onrender.com" >> .env

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: https://gracie-backend.onrender.com

      - name: Fix Gradle wrapper version
        run: |
          PROPS=android/gradle/wrapper/gradle-wrapper.properties
          echo "=== Before fix ==="
          cat "$PROPS"
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.13-bin.zip|' "$PROPS"
          echo "=== After fix ==="
          cat "$PROPS"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: https://gracie-backend.onrender.com

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gracie-beta-android
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
